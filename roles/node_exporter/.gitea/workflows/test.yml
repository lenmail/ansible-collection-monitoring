---
name: Gitea Actions Demo
run-name: "${{ gitea.actor }} is testing out Gitea Actions \U0001F680"
on: [push]

jobs:
  Explore-Gitea-Actions:
    runs-on: ubuntu-latest
    steps:
    - run: "echo \"\U0001F389 The job was automatically triggered by a ${{ gitea.event_name }} event.\""
    - run: "echo \"\U0001F427 This job is now running on a ${{ runner.os }} server hosted by Gitea!\""
    - run: "echo \"\U0001F50E The name of your branch is ${{ gitea.ref }} and your repository is ${{ gitea.repository }}.\""
    - name: Check out repository code
      uses: actions/checkout@v4
    - run: "echo \"\U0001F4A1 The ${{ gitea.repository }} repository has been cloned to the runner.\""
    - run: "echo \"\U0001F5A5\uFE0F The workflow is now ready to test your code on the runner.\""
    - name: List files in the repository
      run: |
        ls ${{ gitea.workspace }}
    - run: "echo \"\U0001F34F This job's status is ${{ job.status }}.\""

