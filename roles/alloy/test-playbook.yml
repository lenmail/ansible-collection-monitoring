---
# Test-Playbook für die Grafana Alloy Ansible-Rolle
# Datei: test-playbook.yml
# 
# Verwendung:
# ansible-playbook -i inventory test-playbook.yml

- name: Test Grafana Alloy Installation
  hosts: all
  become: true

  vars:
    # Einfache Test-Konfiguration
    alloy_config:
      logging:
        level: debug
        format: json

      loki:
        write:
        - endpoint: "http://localhost:3100/loki/api/v1/push"
          tenant_id: "test"
      local:
        file_match: "/var/log/syslog"
        forward_to: ["loki_0"]
  roles:
  - role: lenmail.monitoring.alloy

  post_tasks:
  - name: Verify alloy is running
    ansible.builtin.systemd:
      name: alloy
    register: alloy_status

  - name: Display service status
    ansible.builtin.debug:
      msg: "Alloy service status: {{ alloy_status.status.ActiveState }}"
  - name: Check alloy config syntax
    ansible.builtin.command: alloy fmt /etc/alloy/config.alloy
    register: config_check
    failed_when: config_check.rc != 0
    changed_when: false

  - name: Display config check result
    ansible.builtin.debug:
      msg: "Alloy configuration syntax is valid"
    when: config_check.rc == 0
