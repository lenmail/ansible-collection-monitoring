---
# Beispiel-Konfiguration für die Grafana Alloy Ansible-Rolle
# Multi-Tenant Setup für Normal- und Audit-Logs

# Basis-Service-Konfiguration
alloy_service_enabled: true
alloy_service_state: started
alloy_log_level: info

# Loki-Endpoints und Tenant-Konfiguration
alloy_loki_endpoint: "http://loki.example.com:3100/loki/api/v1/push"
alloy_normal_logs_tenant: "production-logs"
alloy_audit_logs_tenant: "security-logs"

# Erweiterte Alloy-Konfiguration mit Multi-Tenant-Setup
alloy_config:
  # Logging-Konfiguration
  logging:
    level: info
    format: logfmt

  # Loki-Konfiguration für verschiedene Log-Typen
  loki:
    write:
      # Normal logs endpoint
    - endpoint: "{{ alloy_loki_endpoint }}"
      tenant_id: "{{ alloy_normal_logs_tenant }}"
        # Optional: Basic Auth für Normal-Logs
        # basic_auth:
        #   username: "normal_logs_user"
        #   password: "normal_logs_password"
      # Audit logs endpoint (separater Tenant)
    - endpoint: "{{ alloy_loki_endpoint }}"
      tenant_id: "{{ alloy_audit_logs_tenant }}"
        # Optional: Basic Auth für Audit-Logs
        # basic_auth:
        #   username: "audit_logs_user"
        #   password: "audit_logs_password"
        # Optional: TLS-Konfiguration für sensible Audit-Logs
        # tls_config:
        #   insecure_skip_verify: false
        #   cert_file: "/etc/ssl/certs/audit-client.pem"
        #   key_file: "/etc/ssl/private/audit-client.key"
        #   ca_file: "/etc/ssl/certs/ca.pem"

    # Log-Quellen mit Tenant-Zuordnung
    source:
      file:
        # Normale System-Logs → Normal-Logs-Tenant
      - targets:
        - __path__: "/var/log/syslog"
          job: "syslog"
          log_type: "system"
          environment: "production"
          host: "{{ ansible_hostname }}"
        - __path__: "/var/log/messages"
          job: "messages"
          log_type: "system"
          environment: "production"
          host: "{{ ansible_hostname }}"
        - __path__: "/var/log/daemon.log"
          job: "daemon"
          log_type: "system"
          environment: "production"
          host: "{{ ansible_hostname }}"
        - __path__: "/var/log/nginx/*.log"
          job: "nginx"
          log_type: "application"
          service: "webserver"
          host: "{{ ansible_hostname }}"
        - __path__: "/var/log/apache2/*.log"
          job: "apache"
          log_type: "application"
          service: "webserver"
          host: "{{ ansible_hostname }}"
        forward_to: ["loki_0"]    # Normal logs tenant
        # Security/Audit-Logs → Audit-Logs-Tenant
      - targets:
        - __path__: "/var/log/audit/audit.log"
          job: "audit"
          log_type: "security"
          classification: "sensitive"
          host: "{{ ansible_hostname }}"
        - __path__: "/var/log/auth.log"
          job: "auth"
          log_type: "security"
          classification: "sensitive"
          host: "{{ ansible_hostname }}"
        - __path__: "/var/log/secure"
          job: "secure"
          log_type: "security"
          classification: "sensitive"
          host: "{{ ansible_hostname }}"
        - __path__: "/var/log/fail2ban.log"
          job: "fail2ban"
          log_type: "security"
          classification: "sensitive"
          host: "{{ ansible_hostname }}"
        - __path__: "/var/log/ufw.log"
          job: "firewall"
          log_type: "security"
          classification: "sensitive"
          host: "{{ ansible_hostname }}"
        forward_to: ["loki_1"]    # Audit logs tenant

  # Prometheus-Metriken (optional)
  prometheus:
    remote_write:
    - url: "http://prometheus.example.com:9090/api/v1/write"
        # Optional: Basic Auth
        # basic_auth:
        #   username: "prometheus_user"
        #   password: "prometheus_password"

    scrape:
      static:
      - targets: ["localhost:9090"]
        job_name: "alloy"
        forward_to: ["prometheus_0"]

  # Service Discovery (optional)
  discovery:
    kubernetes:
      role: pod
      namespaces:
        names: ["default", "monitoring"]
      relabel:
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace

  # Lokale Log-Dateien (vereinfachte Syntax)
  local:
    file_match: "/var/log/*.log"
    forward_to: ["loki_0"]

  # Custom Configuration Blocks (für erweiterte Konfigurationen)
  custom:
  - |
    // Custom Alloy configuration block
    otelcol.receiver.otlp "default" {
      grpc {
        endpoint = "0.0.0.0:4317"
      }
      http {
        endpoint = "0.0.0.0:4318"
      }
      output {
        traces  = [otelcol.exporter.otlp.default.input]
        metrics = [otelcol.exporter.prometheus.default.input]
      }
    }

# Firewall-Konfiguration (falls erforderlich)
alloy_firewall_enabled: false
alloy_firewall_ports:
- "12345/tcp"    # Alloy HTTP API Port
- "4317/tcp"     # OTLP gRPC
- "4318/tcp"     # OTLP HTTP

# Systemd Service Override (optional)
alloy_service_override:
  Environment:
  - "ALLOY_LOG_LEVEL=debug"
  - "CUSTOM_VARIABLE=production"
  ExecStartPre:
  - "/usr/bin/test -f /etc/alloy/config.alloy"
  Restart: "always"
  RestartSec: "5"
