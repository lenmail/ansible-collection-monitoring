---
- name: Include OS-specific variables
  include_vars: "{{ ansible_os_family }}.yml"
  tags:
  - alloy
  - alloy-config

- name: Install Grafana Alloy package
  package:
    name: "{{ alloy_package_name }}"
    state: present
  become: true
  notify: start alloy
  tags:
  - alloy
  - alloy-install

- name: Create alloy configuration directory
  file:
    path: "{{ alloy_config_dir }}"
    state: directory
    owner: "{{ alloy_user }}"
    group: "{{ alloy_group }}"
    mode: '0755'
  become: true
  tags:
  - alloy
  - alloy-config

- name: Create alloy data directory
  file:
    path: "{{ alloy_data_dir }}"
    state: directory
    owner: "{{ alloy_user }}"
    group: "{{ alloy_group }}"
    mode: '0755'
  become: true
  tags:
  - alloy
  - alloy-config

- name: Generate alloy configuration file
  template:
    src: config.alloy.j2
    dest: "{{ alloy_config_file }}"
    owner: "{{ alloy_user }}"
    group: "{{ alloy_group }}"
    mode: '0644'
    backup: true
  become: true
  notify: restart alloy
  tags:
  - alloy
  - alloy-config

- name: Create systemd service override directory
  file:
    path: /etc/systemd/system/{{ alloy_service_name }}.service.d
    state: directory
    mode: '0755'
  become: true
  when: alloy_service_override | length > 0
  tags:
  - alloy
  - alloy-service

- name: Create systemd service override file
  template:
    src: systemd-override.conf.j2
    dest: /etc/systemd/system/{{ alloy_service_name }}.service.d/override.conf
    mode: '0644'
  become: true
  when: alloy_service_override | length > 0
  notify:
  - restart alloy
  tags:
  - alloy
  - alloy-service

- name: Configure firewall for alloy
  firewalld:
    port: "{{ item }}"
    permanent: true
    state: enabled
    immediate: true
  loop: "{{ alloy_firewall_ports }}"
  become: true
  when:
  - alloy_firewall_enabled
  - alloy_firewall_ports | length > 0
  - ansible_os_family == "RedHat"
  tags:
  - alloy
  - alloy-firewall

- name: Configure UFW for alloy
  ufw:
    rule: allow
    port: "{{ item.split('/')[0] }}"
    proto: "{{ item.split('/')[1] | default('tcp') }}"
  loop: "{{ alloy_firewall_ports }}"
  become: true
  when:
  - alloy_firewall_enabled
  - alloy_firewall_ports | length > 0
  - ansible_os_family == "Debian"
  tags:
  - alloy
  - alloy-firewall

- name: Start and enable alloy service
  systemd:
    name: "{{ alloy_service_name }}"
    state: "{{ alloy_service_state }}"
    enabled: "{{ alloy_service_enabled }}"
    daemon_reload: true
  become: true
  tags:
  - alloy
  - alloy-service

- name: Verify alloy service status
  systemd:
    name: "{{ alloy_service_name }}"
  register: alloy_service_status
  become: true
  tags:
  - alloy
  - alloy-verify

- name: Display alloy service status
  debug:
    msg: "Alloy service is {{ alloy_service_status.status.ActiveState }}"
  tags:
  - alloy
  - alloy-verify
