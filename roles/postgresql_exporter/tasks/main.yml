---
- name: create system group
  ansible.builtin.group:
    name: "prometheus"
    system: true
    state: present
  become: true
  tags: postgres_exporter

- name: create system user
  ansible.builtin.user:
    name: "prometheus"
    system: true
    shell: "/sbin/nologin"
    group: "prometheus"
    createhome: false
  become: true
  tags: postgres_exporter

- name: create directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "prometheus"
    group: "prometheus"
    mode: 0755
  with_items:
  - "/etc/postgres_exporter"
  become: true
  tags: postgres_exporter

- name: check if is installed
  ansible.builtin.stat:
    path: "/usr/local/bin/postgres_exporter"
  register: __postgres_exporter_is_installed
  become: true
  tags: postgres_exporter

- name: gather currently installed version (if any)
  ansible.builtin.command: "/usr/local/bin/postgres_exporter --version"
  changed_when: false
  register: __postgres_exporter_current_version_output
  when: __postgres_exporter_is_installed.stat.exists
  become: true
  tags: postgres_exporter

- name: download binary to local folder
  ansible.builtin.get_url:
    url: "https://github.com/prometheus-community/postgres_exporter/releases/download/v{{ postgres_exporter_version }}/postgres_exporter-{{ postgres_exporter_version }}.linux-{{ go_arch }}.tar.gz"
    dest: "/tmp/postgres_exporter-{{ postgres_exporter_version }}.linux-{{ go_arch }}.tar.gz"
    mode: "0644"
  #environment: "{{ proxy_env }}"
  register: _download_binary
  until: _download_binary is succeeded
  retries: 5
  delay: 2
  delegate_to: localhost
  check_mode: false
  become: true
  tags: postgres_exporter
  when: (not __postgres_exporter_is_installed.stat.exists) #or (__postgres_exporter_current_version_output.stdout_lines[0].split(" ")[2] != postgres_exporter_version)

- name: unpack binary
  ansible.builtin.unarchive:
    src: "/tmp/postgres_exporter-{{ postgres_exporter_version }}.linux-{{ go_arch }}.tar.gz"
    dest: "/tmp"
    creates: "/tmp/postgres_exporter-{{ postgres_exporter_version }}.linux-{{ go_arch }}/postgres_exporter"
  delegate_to: localhost
  check_mode: false
  become: true
  tags: postgres_exporter
  when: (not __postgres_exporter_is_installed.stat.exists) #or (__postgres_exporter_current_version_output.stdout_lines[0].split(" ")[2] != postgres_exporter_version)

- name: propagate binaries
  ansible.builtin.copy:
    src: "/tmp/postgres_exporter-{{ postgres_exporter_version }}.linux-{{ go_arch }}/postgres_exporter"
    dest: "/usr/local/bin/postgres_exporter"
    mode: 0755
    owner: root
    group: root
  notify: restart postgres_exporter
  become: true
  tags: postgres_exporter
  when: (not __postgres_exporter_is_installed.stat.exists) #or (__postgres_exporter_current_version_output.stdout_lines[0].split(" ")[2] != postgres_exporter_version)

- name: create systemd service unit
  ansible.builtin.template:
    src: postgres_exporter.service.j2
    dest: /etc/systemd/system/postgres_exporter.service
    owner: root
    group: root
    mode: 0644
  notify: restart postgres_exporter
  become: true
  tags: postgres_exporter

- name: ensure service is started and enabled
  ansible.builtin.systemd:
    daemon_reload: true
    name: postgres_exporter
    enabled: true
    state: started
  become: true
  tags: postgres_exporter
