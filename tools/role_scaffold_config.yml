---
collection_namespace: lenmail
collection_name: monitoring
min_ansible_version: "2.16"
common_platforms:
- name: Ubuntu
  display: Ubuntu 22.04+
  versions:
  - jammy
  - noble
- name: Debian
  display: Debian 12+
  versions:
  - bookworm
- name: EL
  display: RHEL 9+
  versions:
  - "9"
role_descriptions:
  alertmanager: Install and configure Prometheus Alertmanager.
  alloy: Install and configure Grafana Alloy as a telemetry agent.
  blackbox_exporter: Install and configure the Prometheus blackbox_exporter.
  consul_exporter: Install and configure the Prometheus consul_exporter.
  dovecot_exporter: Install and configure a Dovecot Prometheus exporter.
  grafana: Install and configure Grafana dashboards, datasources, and settings.
  grafana_agent: Install and configure Grafana Agent.
  ilo5_exporter: Install and configure the HPE iLO5 Prometheus exporter.
  ipmi_exporter: Install and configure the Prometheus ipmi_exporter.
  keepalived_exporter: Install and configure the Prometheus keepalived_exporter.
  node_exporter: Install and configure Prometheus node_exporter.
  postfix_exporter: Install and configure a Postfix Prometheus exporter.
  postgresql_exporter: Install and configure the postgres_exporter for PostgreSQL metrics.
  process_exporter: Install and configure the Prometheus process_exporter.
  prometheus: Install and configure the Prometheus server and rule files.
  promtail: Install and configure Grafana Promtail log shipping.
  pushgateway: Install and configure the Prometheus Pushgateway.
  redis_exporter: Install and configure the Prometheus redis_exporter.
  snmp_exporter: Install and configure the Prometheus snmp_exporter.
  squid_exporter: Install and configure the Prometheus squid_exporter.
  systemd_exporter: Install and configure the Prometheus systemd_exporter.
  unbound_exporter: Install and configure the Prometheus unbound_exporter.
  vector: Install and configure Vector for log and metric pipelines.
  victoriametrics: Install and configure VictoriaMetrics.
role_platform_overrides: {}
